<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Grokonpedia – Konneries Grokoniennes</title>
  <style>
    body { margin: 0; padding: 0; min-height: 100vh; background-color: #080808; font-family: sans-serif; color: #ffffff; display: flex; flex-direction: column; align-items: center; }
    canvas#etoiles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    header { position: relative; z-index: 1; width: 100%; padding: 20px; text-align: center; font-size: 2rem; font-weight: bold; border-bottom: 1px solid rgba(65,105,225,0.15); }
    header a { color: #ffffff; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    main { position: relative; z-index: 1; flex: 1; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
    h1 { font-size: clamp(28px, 5vw, 56px); text-align: center; color: #e6e6e6; margin-bottom: 10px; }
    .section-titre { font-size: 1.1rem; color: #9b9b9b; font-style: italic; text-align: center; margin-bottom: 30px; }
    .sous-section { font-size: 1.3rem; font-weight: bold; color: #6a8ff0; margin: 30px 0 15px; border-bottom: 1px solid rgba(65,105,225,0.3); padding-bottom: 6px; }
    .entree { border: 1px solid #444; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; background: rgba(255,255,255,0.04); }
    .entree h2 { font-size: 1.2rem; margin: 0 0 12px 0; color: #e6e6e6; }
    .entree p { margin: 0 0 10px 0; font-size: 0.95rem; line-height: 1.6; color: #cccccc; }
    .entree p:last-child { margin-bottom: 0; }
    .entree img { display: block; width: 100%; max-width: 600px; height: auto; margin: 0 auto; border-radius: 8px; }
    footer { position: relative; z-index: 1; width: 100%; padding: 10px; text-align: center; color: #555; font-size: 0.85rem; border-top: 1px solid rgba(65,105,225,0.1); }
    a { color: #4169e1; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<canvas id="etoiles"></canvas>
<header><a href="../index.html">Grokonpedia</a></header>
<main>
  <h1>Konneries Grokoniennes</h1>
  <div class="section-titre">Des jeux de mots pis de maux qui font mal comme du bon sens</div>

  <div class="sous-section">Jeux de mots/maux</div>

  <div class="entree">
    <h2>La gastro-entérite</h2>
    <img src="gastro-enterite-sans-le.png" alt="Gastro-entérite : la vérité phonétique — gaz trop entré vite!">
  </div>

</main>

<footer>© 2025 Pufcorn. Tout contenu original m'appartient. Parodie humoristique. En construction.</footer>

<script>
(function() {
  const canvas = document.getElementById('etoiles');
  const ctx = canvas.getContext('2d');
  let etoiles = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initEtoiles() {
    etoiles = [];
    for (let i = 0; i < 180; i++) {
      etoiles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.2, alpha: Math.random()*0.7+0.1, vitesse: Math.random()*0.4+0.1, dir: Math.random()>0.5?1:-1 });
    }
  }
  function dessiner() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    etoiles.forEach(e => {
      e.alpha += 0.003 * e.dir * e.vitesse;
      if (e.alpha > 0.85 || e.alpha < 0.05) e.dir *= -1;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,215,255,${e.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(dessiner);
  }
  resize(); initEtoiles(); dessiner();
  window.addEventListener('resize', () => { resize(); initEtoiles(); });
})();
</script>

</body>
</html>
