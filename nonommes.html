<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Nônommes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#080808;color:#e8e8e0;min-height:100vh}
canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:1.5rem 1rem 3rem}
h1{font-family:'Playfair Display',Georgia,serif;font-size:2rem;color:#e8e0c8;margin-bottom:0.25rem;letter-spacing:.02em}
.sous-titre{color:#888;font-size:0.85rem;margin-bottom:1rem;font-family:'Space Mono',monospace}
.search-wrap{position:sticky;top:0;background:#080808ee;backdrop-filter:blur(6px);padding:0.75rem 0;z-index:10;margin-bottom:0.5rem}
input#srch{width:100%;padding:10px 14px;border:1px solid #333;border-radius:8px;background:#111;color:#e8e8e0;font-size:15px;outline:none;transition:border-color .2s}
input#srch:focus{border-color:#6b5caa}
input#srch::placeholder{color:#555}
.cats{display:flex;flex-wrap:wrap;gap:6px;margin:0.5rem 0 1rem}
.cat-btn{padding:5px 12px;border:1px solid #333;border-radius:20px;background:#111;color:#999;font-size:13px;cursor:pointer;transition:all .15s;user-select:none}
.cat-btn:hover{border-color:#6b5caa;color:#c8b8f0}
.cat-btn.active{background:#1a1430;border-color:#6b5caa;color:#c8b8f0}
.cat-label{font-family:'Space Mono',monospace;font-size:11px;color:#555;margin:1rem 0 0.35rem;grid-column:1/-1;letter-spacing:.08em;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:4px}
.e{width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:26px;border-radius:8px;cursor:pointer;transition:background .1s,transform .08s;user-select:none}
.e:hover{background:#1a1a2a}
.e:active{transform:scale(0.88);background:#1a1430}
.vide{color:#555;font-size:14px;grid-column:1/-1;padding:1.5rem 0}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1430;border:1px solid #6b5caa;border-radius:8px;padding:10px 20px;font-size:15px;color:#c8b8f0;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer{text-align:center;color:#333;font-size:12px;margin-top:2rem;font-family:'Space Mono',monospace}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Space+Mono&display=swap" rel="stylesheet">
</head>

const cats=Object.keys(DATA);
let activeCat=null,searchQ="";
const catsEl=document.getElementById("cats");
const gridEl=document.getElementById("grid");
const srch=document.getElementById("srch");
const toast=document.getElementById("toast");
let toastTimer;

cats.forEach(c=>{
  const btn=document.createElement("button");
  btn.className="cat-btn";btn.textContent=c;
  btn.onclick=()=>{
    activeCat=activeCat===c?null:c;
    srch.value="";searchQ="";render();
    document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
    if(activeCat)btn.classList.add("active");
  };
  catsEl.appendChild(btn);
});

function matchesQuery(em,q){
  if(!q)return true;
  return KEYS[em]?KEYS[em].some(k=>k.includes(q)):em.includes(q);
}

function render(){
  gridEl.innerHTML="";
  const q=searchQ.toLowerCase().trim();
  const showCats=activeCat?[activeCat]:cats;
  let count=0;
  showCats.forEach(cat=>{
    let all;
    if(!q){all=DATA[cat];}
    else if(cat.toLowerCase().includes(q)){all=DATA[cat];}
    else{all=DATA[cat].filter(em=>matchesQuery(em,q));}
    if(!all.length)return;
    if(!activeCat){
      const lbl=document.createElement("div");
      lbl.className="cat-label";lbl.textContent=cat;
      gridEl.appendChild(lbl);
    }
    all.forEach(em=>{
      const div=document.createElement("div");
      div.className="e";div.textContent=em;div.title=em;
      div.onclick=()=>copy(em);
      gridEl.appendChild(div);count++;
    });
  });
  if(!count){
    const v=document.createElement("div");
    v.className="vide";v.textContent="Aucun resultat — essaie par categorie!";
    gridEl.appendChild(v);
  }
}

function copy(em){
  if(navigator.clipboard){navigator.clipboard.writeText(em).then(()=>showToast(em)).catch(()=>fallback(em));}
  else fallback(em);
}
function fallback(em){
  const ta=document.createElement("textarea");ta.value=em;
  ta.style.cssText="position:fixed;opacity:0;top:0;left:0";
  document.body.appendChild(ta);ta.select();
  document.execCommand("copy");document.body.removeChild(ta);showToast(em);
}
function showToast(em){
  clearTimeout(toastTimer);
  toast.textContent=em+"  copie!";
  toast.classList.add("show");
  toastTimer=setTimeout(()=>toast.classList.remove("show"),1800);
}

srch.addEventListener("input",e=>{
  searchQ=e.target.value;activeCat=null;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  render();
});

render();

(function(){
  const c=document.getElementById("stars");
  const ctx=c.getContext("2d");
  let W,H,stars=[];
  function init(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    stars=Array.from({length:220},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,a:Math.random(),s:Math.random()*.003+.001}));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{s.a+=s.s;if(s.a>1||s.a<0)s.s*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle="rgba(255,255,240,"+(s.a*.7)+")";ctx.fill();});
    requestAnimationFrame(draw);
  }
  window.addEventListener("resize",init);init();draw();
})();
</script>
